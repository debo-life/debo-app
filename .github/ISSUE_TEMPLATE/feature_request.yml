name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem you are trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is the user need?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?

  - type: textarea
    id: why
    attributes:
      label: Why This Matters
      description: How many users would benefit? How often would this be used?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Small (localized change)
        - Medium (new component or page)
        - Large (architectural change)
    validations:
      required: true

  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to contribute this feature?
      options:
        - "Yes"
        - "Maybe"
        - "No"
